name: Check Build

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    PNPM_VERSION: "10.30.3"
    NODE_VERSION: 24

jobs:
    check-server:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install dependencies (ubuntu only)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Check Server
              run: cargo check --bin nexium-server

    # -----------------------------------------------------------------------------------------------------

    check-client-tauri:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install dependencies (ubuntu only)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Check Tauri
              run: cargo check --bin nexium-client

    # -----------------------------------------------------------------------------------------------------

    check-client-svelte:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: "${{ env.PNPM_VERSION }}"

            - name: Use Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
                  cache-dependency-path: client/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm -C client install --frozen-lockfile

            - name: Check Svelte
              run: pnpm -C client type-check
