name: Release

on:
    push:
        tags:
            - "v-test*"

permissions:
    contents: write
    packages: write

env:
    TAG_VERSION: "${GITHUB_REF_NAME#v}"
    PNPM_VERSION: "10.30.3"
    NODE_VERSION: 24
    BUNDLE_PATH: "target/release/bundle/**"

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            # - name: Install pnpm
            #   uses: pnpm/action-setup@v4
            #   with:
            #       version: "${{ env.PNPM_VERSION }}"

            # - name: Use Node.js ${{ env.NODE_VERSION }}
            #   uses: actions/setup-node@v4
            #   with:
            #       node-version: ${{ env.NODE_VERSION }}
            #       cache: "pnpm"
            #       cache-dependency-path: client/pnpm-lock.yaml

            - name: Echo version
              run: echo "Releasing version ${{ env.TAG_VERSION }}"

            - name: Echo bundle path
              run: echo "Bundle path ${{ env.BUNDLE_PATH }}"

    # -----------------------------------------------------------------------------------------------------

    build-server:
        needs: check
        runs-on: ${{ matrix.platform }}

        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "ubuntu-latest"
                    - platform: "windows-latest"
                    - platform: "macos-latest"

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-latest' # This must match the platform value defined above.
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Build Server
              run: cargo build --bin nexium-server --release

            - name: Prepare server binary (Linux/macOS)
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  mkdir -p dist
                  mv target/release/nexium-server "dist/nexium-server-${{ matrix.platform }}"

            - name: Prepare server binary (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path dist | Out-Null
                  Move-Item -Force target/release/nexium-server.exe "dist/nexium-server-${{ matrix.platform }}.exe"

            - name: Upload server binary (artifact)
              if: runner.os != 'Windows'
              uses: actions/upload-artifact@v4
              with:
                  name: nexium-server-${{ matrix.platform }}
                  path: dist/nexium-server-${{ matrix.platform }}

            - name: Upload server binary (artifact, Windows)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@v4
              with:
                  name: nexium-server-${{ matrix.platform }}
                  path: dist/nexium-server-${{ matrix.platform }}.exe

    # -----------------------------------------------------------------------------------------------------

    build-client:
        needs: check
        runs-on: ${{ matrix.platform }}

        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "ubuntu-latest"
                    - platform: "windows-latest"
                    - platform: "macos-latest"

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: "${{ env.PNPM_VERSION }}"

            - name: Use Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
                  cache-dependency-path: client/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm -C client install --frozen-lockfile

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-latest' # This must match the platform value defined above.
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Build and bundle (Tauri)
              uses: tauri-apps/tauri-action@v0

            - name: Upload client bundles (artifact)
              if: runner.os != 'Windows'
              uses: actions/upload-artifact@v4
              with:
                  name: nexium-client-${{ matrix.platform }}
                  path: |
                      ${{ env.BUNDLE_PATH }}/*.deb
                      ${{ env.BUNDLE_PATH }}/*.rpm
                      ${{ env.BUNDLE_PATH }}/*.AppImage
                      ${{ env.BUNDLE_PATH }}/*.dmg
                  if-no-files-found: error

            - name: Upload client bundles (artifact)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@v4
              with:
                  name: nexium-client-${{ matrix.platform }}
                  path: ${{ env.BUNDLE_PATH }}/*.exe
                  if-no-files-found: error

    # -----------------------------------------------------------------------------------------------------

    release:
        name: Publish GitHub Release
        needs: [build-server, build-client]
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Download bundles (all platforms)
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Create GitHub Release (attach all assets)
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/**
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
