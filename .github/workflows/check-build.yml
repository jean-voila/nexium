    # -----------------------------------------------------------------------------------------------------

    build-check:
        # needs: check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: "${{ env.PNPM_VERSION }}"

            - name: Use Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
                  cache-dependency-path: client/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm -C client install --frozen-lockfile

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install dependencies (ubuntu only)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Check Rust Server
              run: cargo check --bin nexium-server

            - name: Check Rust Client
              run: cargo check --bin nexium-client

            - name: Check Typescript Client
              run: pnpm -C client type-check
